---
deployment:
  tasks:
    - export REPO_PATH=/home/gochess/gochess_repo
    - export DEPLOYPATH=/home/gochess/public_html
    - export GITHUB_REPO=https://github.com/MJ-XO/Gochess.git
    
    - echo "Step 1: Removing old repository..."
    - /bin/rm -rf $REPO_PATH
    
    - echo "Step 2: Cloning fresh code from GitHub..."
    - git clone $GITHUB_REPO $REPO_PATH
    
    - echo "Step 3: Checking out main branch with latest code..."
    - cd $REPO_PATH && git checkout main
    
    - echo "Step 4: Verifying latest commit..."
    - cd $REPO_PATH && git log -1 --oneline
    
    - echo "Step 5: Clearing old deployment files..."
    - /bin/rm -rf $DEPLOYPATH/*
    
    - echo "Step 6: Deploying fresh dist folder to public_html..."
    - /bin/cp -R $REPO_PATH/dist/* $DEPLOYPATH/
    
    - echo "Step 7: Deployment complete!"
    - echo "Deployed files:"
    - ls -la $DEPLOYPATH | head -20