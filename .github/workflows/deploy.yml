name: Build and Deploy Chess Hub

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Upload dist files to public_html
        run: |
          find dist -type d | while read dirpath; do
            relative="${dirpath#dist}"
            remote_path="/home/gochess/public_html${relative}"
            encoded_parent=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$(dirname "$remote_path")'))")
            encoded_name=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$(basename "$remote_path")'))")
            curl -s -X POST \
              -H "Authorization: cpanel gochess:${{ secrets.CPANEL_API_TOKEN }}" \
              "https://gochess.in:2083/execute/Fileman/mkdir?path=${encoded_parent}&name=${encoded_name}" > /dev/null
          done

          find dist -type f | while read filepath; do
            relative="${filepath#dist/}"
            remote_dir="/home/gochess/public_html/$(dirname "$relative")"
            echo "Uploading $filepath → $remote_dir"
            RESPONSE=$(curl -s -X POST \
              -H "Authorization: cpanel gochess:${{ secrets.CPANEL_API_TOKEN }}" \
              -F "dir=${remote_dir}" \
              -F "file-1=@${filepath}" \
              "https://gochess.in:2083/execute/Fileman/upload_files")
            echo "$RESPONSE"
          done

      - name: Verify deployment
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: cpanel gochess:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://gochess.in:2083/execute/Fileman/list?dir=/home/gochess/public_html")
          echo "public_html contents: $RESPONSE"
          echo "✅ Deployment complete"