name: Build and Auto-Commit Chess Hub

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Commit and Push Built Files
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add -f dist/
          git diff-index --quiet HEAD || git commit -m "Automated build: update dist folder"
          git push origin main

      - name: Wait for GitHub to sync
        run: sleep 5

      - name: Force Update cPanel Repository
        run: |
          echo "Step 1: Forcing repository pull from GitHub"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: cpanel gochess:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://gochess.in:2083/execute/VersionControl/update?repository_root=/home/gochess/gochess_repo&force_update=1")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Update HTTP Status: $HTTP_CODE"
          [ "$HTTP_CODE" != "200" ] && echo "⚠️ Update failed" && exit 1
          echo "✅ Repository update triggered"

      - name: Wait for repo update to complete
        run: sleep 15

      - name: Deploy from Updated Repository
        run: |
          echo "Step 2: Triggering deployment"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: cpanel gochess:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://gochess.in:2083/execute/VersionControlDeployment/create?repository_root=/home/gochess/gochess_repo")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Deploy HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          [ "$HTTP_CODE" != "200" ] && echo "❌ Deploy failed" && exit 1
          echo "✅ Deployment triggered successfully"