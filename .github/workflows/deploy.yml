name: Build and Auto-Commit Chess Hub

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Commit and Push Built Files
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add -f dist/
          git diff-index --quiet HEAD || git commit -m "Automated build: update dist folder"
          git push origin main

      - name: Trigger cPanel Deployment
        run: |
          echo "=========================================="
          echo "Step 1: Updating repository on cPanel"
          echo "=========================================="
          UPDATE_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: cpanel gochess:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://gochess.in:2083/execute/VersionControl/update?repository_root=/home/gochess/gochess_repo&force_update=1")
          
          HTTP_CODE=$(echo "$UPDATE_RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$UPDATE_RESPONSE" | head -n-1)
          
          echo "HTTP Status Code: $HTTP_CODE"
          echo "Response: $RESPONSE_BODY"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Repository update failed!"
            exit 1
          fi
          echo "✅ Repository update successful!"
          
          echo ""
          echo "=========================================="
          echo "Step 2: Creating deployment on cPanel"
          echo "=========================================="
          DEPLOY_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: cpanel gochess:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://gochess.in:2083/execute/VersionControlDeployment/create?repository_root=/home/gochess/gochess_repo")
          
          HTTP_CODE=$(echo "$DEPLOY_RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$DEPLOY_RESPONSE" | head -n-1)
          
          echo "HTTP Status Code: $HTTP_CODE"
          echo "Response: $RESPONSE_BODY"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Deployment creation failed!"
            exit 1
          fi
          echo "✅ Deployment creation successful!"
          echo ""
          echo "=========================================="
          echo "🎉 Full deployment pipeline completed!"
          echo "=========================================="