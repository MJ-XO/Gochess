name: Build and Auto-Commit Chess Hub

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Commit and Push Built Files
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add -f dist/
          git diff-index --quiet HEAD || git commit -m "Automated build: update dist folder"
          git push origin main

      - name: Deploy Built Files
        run: |
          echo "📦 Uploading dist/ to cPanel via SCP..."
          mkdir -p ~/.ssh
          echo "${{ secrets.CPANEL_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H gochess.in >> ~/.ssh/known_hosts 2>/dev/null
          
          echo "🚀 Copying files to public_html..."
          scp -i ~/.ssh/deploy_key -r dist/* gochess@gochess.in:/home/gochess/public_html/
          
          echo "✅ Deployment complete!"