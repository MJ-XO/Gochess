name: Build and Auto-Commit Chess Hub

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Commit and Push Built Files
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add -f dist/
          git diff-index --quiet HEAD || git commit -m "Automated build: update dist folder"
          git push origin main

      - name: Trigger cPanel Deployment
        run: |
          curl -H "Authorization: cpanel gochess:${{ secrets.CPANEL_API_TOKEN }}" \
          "https://gochess.in:2083/execute/VersionControl/update?repository_root=/home/gochess/gochess_repo" \
          && curl -H "Authorization: cpanel gochess:${{ secrets.CPANEL_API_TOKEN }}" \
          "https://gochess.in:2083/execute/VersionControlDeployment/create?repository_root=/home/gochess/gochess_repo"