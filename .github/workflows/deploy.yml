name: Build and Auto-Commit Chess Hub

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Commit and Push Built Files
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add -f dist/
          git diff-index --quiet HEAD || git commit -m "Automated build: update dist folder"
          git push origin main

      - name: Wait for GitHub to sync
        run: sleep 5

      - name: Force Update cPanel Repository
        run: |
          echo "=========================================="
          echo "Step 1: Forcing repository pull from GitHub"
          echo "=========================================="
          FORCE_UPDATE_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: cpanel gochess:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://gochess.in:2083/execute/VersionControl/update?repository_root=/home/gochess/gochess_repo&force_update=1")
          
          HTTP_CODE=$(echo "$FORCE_UPDATE_RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$FORCE_UPDATE_RESPONSE" | head -n-1)
          
          echo "HTTP Status Code: $HTTP_CODE"
          echo "Response: $RESPONSE_BODY"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "⚠️ Repository update returned status $HTTP_CODE"
            echo "Continuing with deployment anyway..."
          else
            echo "✅ Repository force update successful!"
          fi
          
          sleep 2

      - name: Deploy from Updated Repository
        run: |
          echo "=========================================="
          echo "Step 2: Deploying from updated repository"
          echo "=========================================="
          DEPLOY_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: cpanel gochess:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://gochess.in:2083/execute/VersionControlDeployment/create?repository_root=/home/gochess/gochess_repo")
          
          HTTP_CODE=$(echo "$DEPLOY_RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$DEPLOY_RESPONSE" | head -n-1)
          
          echo "HTTP Status Code: $HTTP_CODE"
          echo "Response: $RESPONSE_BODY"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Deployment creation failed with status $HTTP_CODE!"
            exit 1
          fi
          echo "✅ Deployment creation successful!"
          echo ""
          echo "=========================================="
          echo "🎉 Full deployment pipeline completed!"
          echo "Repository updated → Files deployed to public_html"
          echo "=========================================="